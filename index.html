<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متاح - توثيق ميثاق السرية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --brown: #5D4037; --orange: #E67E22; --green: #27ae60; }
        body { font-family: 'Arial', sans-serif; background-color: #f8f9fa; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #receipt-content { width: 650px; background: white; padding: 40px; border: 2px solid #eee; border-top: 15px solid var(--orange); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 20px; }
        .input-group { margin: 20px 0; display: flex; flex-direction: column; gap: 10px; }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; text-align: right; }
        .main-btn { background: var(--brown); color: white; border: none; padding: 20px 80px; font-size: 22px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; }
        .main-btn:hover { background: var(--orange); }
    </style>
</head>
<body>

<div id="receipt-content">
    <div class="header">
        <h1 style="color: var(--brown); margin:0;">متاح — Mootah</h1>
        <p style="color: var(--orange);">ميثاق السرية الرقمي | Digital NDA</p>
    </div>

    <div class="input-group">
        <label>إسم المطلع (الطرف الثاني):</label>
        <input type="text" id="user-name" placeholder="اكتب الإسم بالكامل" required>
        
        <label>رقم الواتساب للمتابعة:</label>
        <input type="tel" id="user-phone" placeholder="مثال: 010XXXXXXXX" required>
    </div>

    <div style="font-size: 13px; line-height: 1.6; color: #333; background: #fff8f1; padding: 15px; border-radius: 5px;">
        <b>تعهد:</b> أوافق بصفتي مطلعاً على مشروع "متاح" الحفاظ على سرية المعلومات وعدم استخدامها تجارياً دون إذن من <b>د. جورج هارون</b>.
    </div>
</div>

<button class="main-btn" id="dl-btn" onclick="processNDA()">أوافق وتحميل الميثاق ✅</button>

<script>
    const FORMSPREE_URL = "https://formspree.io/f/mbdazloj";
    const MY_REAL_PHONE = "201096404193"; // رقمك الصحيح يا دكتور

    async function processNDA() {
        const name = document.getElementById('user-name').value;
        const phone = document.getElementById('user-phone').value;

        if(!name || !phone) {
            alert("من فضلك ادخل الإسم ورقم الهاتف للمتابعة");
            return;
        }

        const btn = document.getElementById('dl-btn');
        btn.innerText = "جاري التوثيق...";
        btn.disabled = true;

        try {
            // 1. توليد PDF
            const canvas = await html2canvas(document.getElementById('receipt-content'), { scale: 2 });
            const imgData = canvas.toDataURL('image/png');
            const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
            pdf.addImage(imgData, 'PNG', 10, 10, 190, 0);
            pdf.save(`Mootah_NDA_${name}.pdf`);

            // 2. إرسال البيانات للإيميل (لتصلك بياناته كاملة)
            await fetch(FORMSPREE_URL, {
                method: 'POST',
                headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    اسم_المستثمر: name,
                    رقم_الهاتف: phone,
                    الرسالة: "تمت الموافقة على ميثاق السرية"
                })
            });

            // 3. فتح الواتساب الخاص بك
            const msg = `دكتور جورج، أنا ${name} (رقمي: ${phone})، أوافق على ميثاق سرية متاح وقد حملت الإيصال.`;
            window.open(`https://wa.me/${MY_REAL_PHONE}?text=${encodeURIComponent(msg)}`, '_blank');

            btn.innerText = "تم بنجاح ✅";
            btn.style.background = "var(--green)";
        } catch (e) {
            alert("حدث خطأ، حاول ثانية");
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
