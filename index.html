<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متاح - توثيق ميثاق السرية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --brown: #5D4037; --orange: #E67E22; --green: #27ae60; }
        body { font-family: 'Arial', sans-serif; background-color: #f8f9fa; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #receipt-content { width: 100%; max-width: 550px; background: white; padding: 30px; border: 1px solid #ddd; border-top: 15px solid var(--orange); box-shadow: 0 5px 20px rgba(0,0,0,0.1); border-radius: 10px; }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .input-group { background: #fff8f1; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ffe0b2; }
        .input-field { margin-bottom: 15px; text-align: right; }
        label { font-weight: bold; color: var(--brown); display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .main-btn { background: var(--brown); color: white; border: none; padding: 20px; font-size: 20px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

<div id="receipt-content">
    <div class="header">
        <h2 style="color: var(--brown); margin:0;">متاح — Mootah</h2>
        <p style="color: var(--orange); font-weight: bold;">ميثاق السرية الرقمي</p>
    </div>

    <form id="mootahForm">
        <div class="input-group">
            <div class="input-field">
                <label>الاسم الكامل:</label>
                <input type="text" name="InvestorName" id="v_name" placeholder="أدخل اسمك هنا" required>
            </div>
            <div class="input-field">
                <label>رقم هاتف الواتساب:</label>
                <input type="tel" name="MobileNumber" id="v_phone" placeholder="أدخل رقمك هنا" required>
            </div>
        </div>
        <button type="button" class="main-btn" id="dl-btn" onclick="submitToGeorge()">أوافق وتحميل الميثاق ✅</button>
    </form>
</div>

<script>
    async function submitToGeorge() {
        const name = document.getElementById('v_name').value;
        const phone = document.getElementById('v_phone').value;
        if (!name || !phone) { alert("برجاء كتابة الاسم ورقم الهاتف أولاً"); return; }
        const btn = document.getElementById('dl-btn');
        btn.innerText = "جاري الحفظ...";
        btn.disabled = true;

        try {
            // إرسال البيانات لـ Formspree لتصلك في الإيميل
            const formData = new FormData();
            formData.append("اسم_المستثمر", name);
            formData.append("رقم_الهاتف", phone);
            await fetch("https://formspree.io/f/mbdazloj", { method: "POST", body: formData, headers: { 'Accept': 'application/json' } });

            // توليد الـ PDF
            const canvas = await html2canvas(document.getElementById('receipt-content'), { scale: 2 });
            const imgData = canvas.toDataURL('image/png');
            const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
            pdf.addImage(imgData, 'PNG', 10, 10, 190, 0);
            pdf.save(`Mootah_NDA_${name}.pdf`);

            // فتح الواتساب الخاص بك بالرقم الصحيح
            const waMsg = `دكتور جورج، أنا ${name}، رقمي ${phone}. أوافق على ميثاق سرية متاح.`;
            window.open(`https://wa.me/201096404193?text=${encodeURIComponent(waMsg)}`, '_blank');
            btn.innerText = "تم التوثيق ✅";
        } catch (e) { alert("حدث خطأ، حاول ثانية"); btn.disabled = false; }
    }
</script>
</body>
</html>
